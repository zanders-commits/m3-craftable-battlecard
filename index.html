  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"00bbebd8-baae-4ab4-9f78-60e3c9c75c84\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <style>/* Reeco Design System — Colors & Type tokens\n * Source: Reeco Brandbook 2026 (Figma) — the canonical brand book.\n *\n * Color usage rules from the brand book:\n *   80% primary  (Mint)\n *   20% secondary + accent (Navy, Rose, Sky, Sun, Stone)\n *   Always maintain sufficient contrast for accessibility\n *   Be consistent across platforms and materials\n *\n * Type rules:\n *   Inter is the primary face (\"Simplified with Inter\").\n *   Maintain consistent hierarchy. Use lowercase for friendly feel.\n *   Don't use more than 2–3 weights on a single page.\n */\n\n/* Inter — local variable font (covers weights 100–900 + italics) */\n@font-face {\n  font-family: 'Inter';\n  src: url(\"f0d7be46-fbac-40eb-8500-a0f1a85eaf00\") format('woff2-variations'),\n       url(\"f0d7be46-fbac-40eb-8500-a0f1a85eaf00\") format('woff2');\n  font-weight: 100 900;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: 'Inter';\n  src: url(\"f0d7be46-fbac-40eb-8500-a0f1a85eaf00\") format('woff2-variations'),\n       url(\"f0d7be46-fbac-40eb-8500-a0f1a85eaf00\") format('woff2');\n  font-weight: 100 900;\n  font-style: italic;\n  font-display: swap;\n}\n\n:root {\n  /* ──────────────── BRAND COLORS — CORE ──────────────── */\n  /* Primary — Mint Green (80% usage). CTA, key headlines, main UI. */\n  --reeco-mint:        #2BCC89;\n  /* Secondary — Navy. Headlines, secondary buttons, accents. Pairs with Mint. */\n  --reeco-navy:        #0A184A;\n  /* Secondary — Rose. Highlights, action-required CTAs, warnings, notifications. */\n  --reeco-rose:        #FF479A;\n  /* Tertiary — Sky. Links, info, progress indicators. */\n  --reeco-sky:         #3BB0F4;\n  /* Tertiary — Sun. Corp, budget warnings, accents. */\n  --reeco-sun:         #F6BE00;\n  /* Neutral — Stone. Body text, subtle UI. Stone 400 = disabled. */\n  --reeco-stone:       #353535;\n\n  /* ──────────────── MINT SCALE ──────────────── */\n  /* 900 → 50, deep teal → ghost mint */\n  --mint-900:          #1A5E6D;\n  --mint-800:          #22917A;\n  --mint-700:          #22A872;   /* Forest Green — hover/pressed for primary */\n  --mint-500:          #2BCC89;   /* core */\n  --mint-300:          #6BDBAC;\n  --mint-200:          #B7EED7;   /* card edges, borders on mint panels */\n  --mint-100:          #DDF7EC;   /* tag bg, table-row hover on mint */\n  --mint-50:           #F2FCF8;   /* subtle accent panel */\n\n  /* ──────────────── NAVY SCALE ──────────────── */\n  --navy-900:          #0A184A;   /* core — deepest brand navy */\n  --navy-800:          #102676;\n  --navy-600:          #5D6CA2;\n  --navy-400:          #96A0C3;\n  --navy-300:          #BCC2D9;\n  --navy-200:          #E2E5EF;\n  --navy-100:          #F5F6F9;\n\n  /* ──────────────── ROSE SCALE ──────────────── */\n  --rose-500:          #FF479A;   /* core */\n  --rose-300:          #FF98C6;\n  --rose-200:          #FFC0DD;\n  --rose-100:          #FFE9F3;\n\n  /* ──────────────── SKY SCALE ──────────────── */\n  --sky-500:           #3BB0F4;   /* core */\n  --sky-400:           #62C0F6;\n  --sky-200:           #BCE4FB;\n  --sky-100:           #E7F6FE;\n\n  /* ──────────────── SUN SCALE ──────────────── */\n  --sun-500:           #F6BE00;   /* core */\n  --sun-400:           #F8CB33;\n  --sun-200:           #FBE28F;\n  --sun-100:           #FDEFC2;\n\n  /* ──────────────── STONE SCALE (NEUTRALS) ──────────────── */\n  --stone-900:         #353535;   /* core — body text */\n  --stone-700:         #5D5D5D;\n  --stone-500:         #9A9A9A;   /* stone 400/500 — disabled */\n  --stone-400:         #C2C2C2;\n  --stone-300:         #E1E1E1;   /* borders, dividers */\n  --stone-200:         #F1F1F1;   /* subtle fill */\n  --stone-100:         #F9F9F9;   /* page background */\n  --white:             #FFFFFF;\n\n  /* ──────────────── STATUS ──────────────── */\n  /* Status uses brand palette directly. */\n  --status-success:    var(--mint-500);\n  --status-success-bg: var(--mint-100);\n  --status-info:       var(--sky-500);\n  --status-info-bg:    var(--sky-100);\n  --status-warning:    var(--sun-500);\n  --status-warning-bg: var(--sun-100);\n  --status-danger:     var(--rose-500);\n  --status-danger-bg:  var(--rose-100);\n\n  /* ──────────────── SEMANTIC FG / BG / BORDER ──────────────── */\n  /* Heading/primary text uses Stone (per brand book — Navy is for accents, not body). */\n  --fg-1:              var(--stone-900);   /* Headings, primary text */\n  --fg-2:              var(--stone-700);   /* Body */\n  --fg-3:              var(--stone-500);   /* Secondary / meta */\n  --fg-accent:         var(--mint-500);    /* Mint headlines, eyebrows */\n  --fg-on-dark:        var(--white);\n  --fg-on-mint:        var(--white);\n  --fg-link:           var(--sky-500);     /* Inter Semi-bold per brand book */\n\n  --bg-app:            var(--stone-100);\n  --bg-surface:        var(--white);\n  --bg-subtle:         var(--stone-200);\n  --bg-accent:         var(--mint-100);\n  --bg-dark:           var(--navy-900);\n\n  --border-1:          var(--stone-300);\n  --border-2:          var(--mint-200);\n  --border-dark:       var(--navy-200);\n\n  /* ──────────────── TYPOGRAPHY ──────────────── */\n  /* Inter is Reeco's primary face (\"Simplified with Inter\" — brand book). */\n  --font-sans:         'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;\n  --font-mono:         'SFMono-Regular', 'Courier New', ui-monospace, monospace;\n\n  /* Weights actively used (brand book limits to 2–3 per page):\n   *   Black, Bold, Semi-bold, Regular. */\n  --fw-regular:        400;\n  --fw-medium:         500;\n  --fw-semi:           600;\n  --fw-bold:           700;\n  --fw-black:          900;\n\n  /* Type scale.\n   * Brand book H1 = 32/36 Black, H2 = 24/28 Bold, H3 = 18/22 Bold,\n   * Body = 12–14 Regular, Links = 12/14 Semi-bold.\n   * Brand book also defines a display scale: 52px section titles,\n   * 100–240px hero numerals. */\n  --fs-hero:           96px;     /* cover-scale display */\n  --fs-display:        52px;     /* section-opener title (brand book) */\n  --fs-h1:             32px;     /* H1 (brand book) */\n  --fs-h2:             24px;     /* H2 */\n  --fs-h3:             18px;     /* H3 */\n  --fs-body-lg:        16px;\n  --fs-body:           14px;     /* Default body — brand book uses 12–14 */\n  --fs-small:          12px;\n  --fs-caption:        11px;     /* eyebrow / label */\n\n  --lh-tight:          1.1;      /* hero/display */\n  --lh-snug:           1.2;      /* h1/h2 */\n  --lh-heading:        1.22;     /* h3 */\n  --lh-body:           1.55;\n  --lh-relaxed:        1.7;\n\n  --ls-tight:          -0.01em;  /* display / hero */\n  --ls-tight-sm:       -0.005em; /* h1/h2 */\n  --ls-wide:           1.5px;\n  --ls-wider:          2.5px;\n\n  /* ──────────────── SPACING / RADIUS / SHADOW ──────────────── */\n  --space-1:   4px;\n  --space-2:   8px;\n  --space-3:  12px;\n  --space-4:  16px;\n  --space-5:  20px;\n  --space-6:  24px;\n  --space-8:  32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n\n  /* Radii — brand book uses generous rounding (the type-hierarchy strip is\n   * radius 40, the dark callout card is radius 40, swatches are 24, tag\n   * pills are pill-shaped). */\n  --radius-xs:    4px;\n  --radius-sm:    6px;\n  --radius-md:    8px;     /* inputs */\n  --radius-lg:   12px;     /* small cards */\n  --radius-xl:   16px;     /* buttons, mid cards */\n  --radius-2xl:  24px;     /* swatches, hero cards */\n  --radius-3xl:  40px;     /* dark/feature cards from brand book */\n  --radius-pill: 999px;\n\n  /* Shadows — brand book uses soft Navy-tinted drop shadows (rgba(10,24,74,*)). */\n  --shadow-xs:  0 1px 2px rgba(10, 24, 74, 0.06);\n  --shadow-sm:  0 1px 3px rgba(10, 24, 74, 0.08), 0 1px 2px rgba(10, 24, 74, 0.05);\n  --shadow-md:  0 6px 16px -4px rgba(10, 24, 74, 0.12), 0 2px 4px rgba(10, 24, 74, 0.06);\n  --shadow-lg:  0 18px 40px -8px rgba(10, 24, 74, 0.18), 0 6px 12px -4px rgba(10, 24, 74, 0.08);\n  --shadow-xl:  0 25px 29px rgba(10, 24, 74, 0.20);   /* brand-book signature card shadow */\n  --shadow-focus: 0 0 0 3px rgba(43, 204, 137, 0.30);\n\n  --duration-fast: 120ms;\n  --duration-med:  180ms;\n  --ease-out:      cubic-bezier(0.16, 1, 0.3, 1);\n\n  /* ──────────────── BACKWARD-COMPAT ALIASES ────────────────\n   * Older UI kits referenced --reeco-green / --reeco-midnight / etc.\n   * Map those to the canonical brand-book tokens so existing markup\n   * picks up the corrected palette without per-file rewrites. */\n  --reeco-green:        var(--mint-500);\n  --reeco-green-dark:   var(--mint-700);\n  --reeco-green-light:  var(--mint-100);\n  --reeco-green-border: var(--mint-200);\n  --reeco-midnight:     var(--navy-900);   /* was an off-brand #1A1A2E — now Navy */\n  --reeco-midnight-2:   var(--navy-800);\n  --reeco-charcoal:     var(--stone-700);\n  --reeco-slate:        var(--stone-500);\n  --reeco-cloud:        var(--stone-300);\n  --reeco-fog:          var(--stone-200);\n  --reeco-mist-bg:      var(--stone-100);\n  --reeco-white:        var(--white);\n\n  --reeco-warning:      var(--sun-500);\n  --reeco-danger:       var(--rose-500);\n  --reeco-danger-bg:    var(--rose-100);\n  --reeco-danger-border:var(--rose-200);\n  --reeco-success-bg:   var(--mint-100);\n  --reeco-success-text: var(--mint-800);\n}\n\n/* ──────────────── BASE ──────────────── */\nbody, .rc-body {\n  font-family: var(--font-sans);\n  font-size: var(--fs-body);\n  line-height: var(--lh-body);\n  color: var(--fg-2);\n  background: var(--bg-app);\n  -webkit-font-smoothing: antialiased;\n}\n\n/* ──────────────── HEADINGS ──────────────── */\n.rc-hero {\n  font-size: var(--fs-hero);\n  font-weight: var(--fw-black);\n  letter-spacing: var(--ls-tight);\n  line-height: var(--lh-tight);\n  color: var(--fg-1);\n}\n.rc-display {\n  font-size: var(--fs-display);\n  font-weight: var(--fw-bold);\n  letter-spacing: var(--ls-tight);\n  line-height: var(--lh-snug);\n  color: var(--fg-1);\n}\n.rc-h1, h1.rc {\n  font-size: var(--fs-h1);\n  font-weight: var(--fw-black);     /* Inter Black per brand book */\n  letter-spacing: var(--ls-tight-sm);\n  line-height: var(--lh-snug);\n  color: var(--fg-1);\n}\n.rc-h2, h2.rc {\n  font-size: var(--fs-h2);\n  font-weight: var(--fw-bold);\n  letter-spacing: var(--ls-tight-sm);\n  line-height: var(--lh-snug);\n  color: var(--fg-1);\n}\n.rc-h3, h3.rc {\n  font-size: var(--fs-h3);\n  font-weight: var(--fw-bold);\n  line-height: var(--lh-heading);\n  color: var(--fg-1);\n}\n\n/* ──────────────── BODY VARIANTS ──────────────── */\n.rc-body-lg {\n  font-size: var(--fs-body-lg);\n  line-height: var(--lh-relaxed);\n  color: var(--fg-2);\n}\n.rc-body, p.rc {\n  font-size: var(--fs-body);\n  line-height: var(--lh-relaxed);\n  color: var(--fg-2);\n}\n.rc-small {\n  font-size: var(--fs-small);\n  color: var(--fg-3);\n}\n.rc-link {\n  color: var(--fg-link);\n  font-weight: var(--fw-semi);\n  text-decoration: none;\n}\n.rc-link:hover { text-decoration: underline; }\n\n/* ──────────────── EYEBROW / LABEL ──────────────── */\n.rc-eyebrow {\n  font-size: var(--fs-caption);\n  font-weight: var(--fw-bold);\n  letter-spacing: var(--ls-wider);\n  text-transform: uppercase;\n  color: var(--fg-3);\n}\n.rc-eyebrow-mint { color: var(--mint-700); }\n.rc-label {\n  font-size: var(--fs-caption);\n  font-weight: var(--fw-semi);\n  letter-spacing: var(--ls-wide);\n  text-transform: uppercase;\n  color: var(--fg-3);\n}\n.rc-mono {\n  font-family: var(--font-mono);\n  font-size: var(--fs-small);\n}\n\n/* ──────────────── BRAND HOUSE MARKERS ──────────────── */\n/* The brand book uses /// as a prefix marker on bullets and as a divider\n * between brand-name and role (e.g. \"Mint Green /// Primary\"). */\n.rc-slash::before {\n  content: \"/// \";\n  color: var(--mint-500);\n  font-weight: var(--fw-bold);\n}\n.rc-slash-divider {\n  color: var(--stone-500);\n  font-weight: var(--fw-bold);\n  margin: 0 0.5em;\n}\n<\u002Fstyle>\n  <script src=\"8a252de4-cfbc-485c-ae38-59da49d6e7c9\"><\u002Fscript>\n  <style>\n    *{box-sizing:border-box}\n    body{margin:0;background:#F4F6F9;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#0B2240;-webkit-font-smoothing:antialiased;-webkit-print-color-adjust:exact;print-color-adjust:exact;}\n    @keyframes bcToastIn{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}\n    @media print{\n      .bc-header{position:static !important;box-shadow:none !important}\n      .bc-noprint{display:none !important}\n      section{break-inside:avoid}\n      body{background:#fff}\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh\">\n\n  <!-- ───────── STICKY HEADER ───────── -->\n  <header class=\"bc-header\" style=\"position:sticky;top:0;z-index:50;background:#0B2240;box-shadow:0 2px 14px rgba(11,34,64,.28)\">\n    <div style=\"max-width:1080px;margin:0 auto;padding:15px 24px;display:flex;align-items:center;justify-content:space-between;gap:14px 20px;flex-wrap:wrap\">\n      <div style=\"display:flex;align-items:center;gap:11px;min-width:0\">\n        <img src=\"f1008900-525a-4aea-9dd6-4064baab2647\" alt=\"reeco\" style=\"height:24px;width:auto;display:block;flex:none\">\n        <span style=\"color:#5E72A0;font-weight:700;font-size:15px;flex:none\">vs.<\u002Fspan>\n        <span style=\"color:#fff;font-weight:900;font-size:18px;letter-spacing:-0.01em;flex:none\">Craftable<\u002Fspan>\n        <span style=\"width:1px;height:18px;background:rgba(255,255,255,.18);flex:none;margin:0 3px\"><\u002Fspan>\n        <span style=\"color:#94A6C0;font-weight:600;font-size:13px;flex:none;white-space:nowrap\">internal battlecard<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap\">\n        <span style=\"background:#16B8A6;color:#04211D;font-weight:800;font-size:12px;padding:5px 11px;border-radius:999px\">{{ segmentLabel }}<\u002Fspan>\n        <span style=\"background:#C0392B;color:#fff;font-weight:800;font-size:12px;padding:5px 11px;border-radius:999px\">🔒 Internal only<\u002Fspan>\n        <span style=\"background:rgba(255,255,255,.12);color:#CFDCEC;font-weight:600;font-size:12px;padding:5px 11px;border-radius:999px\">{{ lastUpdated }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main style=\"max-width:1080px;margin:0 auto;padding:28px 24px 0\">\n\n    <!-- 1. 10-SECOND POSITIONING -->\n    <section>\n      <div style=\"background:#0B2240;border-radius:16px;padding:24px 26px;box-shadow:0 12px 30px rgba(11,34,64,.18)\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:10px\">\n          <span style=\"display:flex;align-items:center;gap:8px;color:#16B8A6;font-weight:800;font-size:13px;text-transform:uppercase;letter-spacing:.06em\">⚡ 10-second positioning<\u002Fspan>\n          <button type=\"button\" onclick=\"{{ positioning.onCopy }}\" class=\"bc-noprint\" style=\"display:inline-flex;align-items:center;gap:6px;border:1.5px solid rgba(22,184,166,.6);color:#16B8A6;background:rgba(22,184,166,.1);font:700 12px/1 'Inter',sans-serif;padding:8px 14px;border-radius:8px;cursor:pointer;white-space:nowrap;transition:all .15s\" style-hover=\"background:#16B8A6;color:#04211D;border-color:#16B8A6\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"9\" y=\"9\" width=\"13\" height=\"13\" rx=\"2\"><\u002Frect><path d=\"M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1\"><\u002Fpath><\u002Fsvg>Copy<\u002Fbutton>\n        <\u002Fdiv>\n        <p style=\"font-size:19px;line-height:1.55;font-weight:500;margin:0;color:#EAF1F8\">{{ positioning.text }}<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 1b. TWO SCENARIOS -->\n    <section style=\"margin-top:18px\">\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px\">\n        <sc-for list=\"{{ scenarios }}\" as=\"sc\" hint-placeholder-count=\"2\">\n          <div style=\"background:#fff;border:1px solid #E4E9F0;border-radius:14px;padding:20px 22px;box-shadow:0 2px 10px rgba(11,34,64,.05)\">\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:8px\">\n              <span style=\"display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:8px;background:{{ sc.badgeBg }};color:{{ sc.badgeColor }};font-weight:900;font-size:14px\">{{ sc.num }}<\u002Fspan>\n              <span style=\"font-weight:800;font-size:15px;color:#0B2240\">{{ sc.title }}<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"margin:0;font-size:14px;line-height:1.55;color:#3D4A5C\">{{ sc.body }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <p style=\"margin:10px 2px 0;font-size:12.5px;color:#8593A6;font-style:italic\">Works for both audiences — don't assume the prospect already owns Craftable.<\u002Fp>\n    <\u002Fsection>\n\n    <!-- 2. WHY WE WIN -->\n    <section style=\"margin-top:36px\">\n      <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:14px\">\n        <span style=\"color:#16B8A6;font-weight:900;font-size:16px\">///<\u002Fspan>\n        <h2 style=\"font-size:23px;font-weight:800;margin:0;color:#0B2240\">Why we win <span style=\"color:#8593A6;font-weight:600;font-size:15px\">(lead with these)<\u002Fspan><\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px\">\n        <sc-for list=\"{{ wins }}\" as=\"w\" hint-placeholder-count=\"3\">\n          <div style=\"background:#F0FBF6;border:1px solid #BEEBD9;border-top:4px solid #1A9E6A;border-radius:14px;padding:20px\">\n            <h3 style=\"margin:0 0 8px;font-size:16px;font-weight:800;color:#0B2240\">{{ w.title }}<\u002Fh3>\n            <p style=\"margin:0;font-size:14px;line-height:1.55;color:#3D4A5C\">{{ w.body }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 3. QUOTE BANK -->\n    <section style=\"margin-top:36px\">\n      <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:4px\">\n        <span style=\"color:#16B8A6;font-weight:900;font-size:16px\">///<\u002Fspan>\n        <h2 style=\"font-size:23px;font-weight:800;margin:0;color:#0B2240\">🔥 Quote bank<\u002Fh2>\n      <\u002Fdiv>\n      <p style=\"margin:0 0 4px 28px;font-size:13.5px;color:#5A6B82\">Copy any line straight into an email or proposal — the button grabs the quote <em>and<\u002Fem> its attribution.<\u002Fp>\n      <sc-for list=\"{{ quoteGroups }}\" as=\"g\" hint-placeholder-count=\"2\">\n        <h3 style=\"font-size:12.5px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:{{ g.accent }};margin:22px 0 12px;display:flex;align-items:center;gap:8px\">\n          <span style=\"width:10px;height:10px;border-radius:3px;background:{{ g.accent }};display:inline-block\"><\u002Fspan>{{ g.heading }}\n        <\u002Fh3>\n        <div style=\"display:grid;grid-template-columns:{{ g.cols }};gap:14px\">\n          <sc-for list=\"{{ g.items }}\" as=\"q\" hint-placeholder-count=\"2\">\n            <div style=\"background:#fff;border:1px solid #E4E9F0;border-left:5px solid {{ g.accent }};border-radius:14px;padding:18px 20px;box-shadow:0 2px 10px rgba(11,34,64,.05);display:flex;flex-direction:column\">\n              <p style=\"font-size:15.5px;line-height:1.5;margin:0 0 14px;color:#0B2240;font-weight:500\">{{ q.text }}<\u002Fp>\n              <div style=\"margin-top:auto;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap\">\n                <span style=\"font-size:12.5px;color:#5A6B82;font-weight:600\">{{ q.attr }}<\u002Fspan>\n                <button type=\"button\" onclick=\"{{ q.onCopy }}\" class=\"bc-noprint\" style=\"flex:none;display:inline-flex;align-items:center;gap:6px;border:1.5px solid #16B8A6;color:#0E7C6F;background:#fff;font:700 12px/1 'Inter',sans-serif;padding:7px 12px;border-radius:8px;cursor:pointer;white-space:nowrap;transition:all .15s\" style-hover=\"background:#16B8A6;color:#fff\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"9\" y=\"9\" width=\"13\" height=\"13\" rx=\"2\"><\u002Frect><path d=\"M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1\"><\u002Fpath><\u002Fsvg>Copy<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fsection>\n\n    <!-- 4. FEATURE COMPARISON -->\n    <section style=\"margin-top:36px\">\n      <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:14px\">\n        <span style=\"color:#16B8A6;font-weight:900;font-size:16px\">///<\u002Fspan>\n        <h2 style=\"font-size:23px;font-weight:800;margin:0;color:#0B2240\">Feature comparison<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"overflow-x:auto;border-radius:14px;box-shadow:0 2px 10px rgba(11,34,64,.06)\">\n        <div style=\"min-width:600px;background:#fff;border-radius:14px;overflow:hidden\">\n          <div style=\"display:grid;grid-template-columns:1.1fr 1.2fr 1.2fr;background:#0B2240\">\n            <div style=\"padding:13px 16px;font-size:13px;font-weight:700;color:#fff\">Capability<\u002Fdiv>\n            <div style=\"padding:13px 16px;font-size:13px;font-weight:800;color:#fff;background:#0E7C6F\">Reeco<\u002Fdiv>\n            <div style=\"padding:13px 16px;font-size:13px;font-weight:700;color:#fff\">Craftable<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ comparison }}\" as=\"row\" hint-placeholder-count=\"7\">\n            <div style=\"display:grid;grid-template-columns:1.1fr 1.2fr 1.2fr;border-top:1px solid #E9EDF3\">\n              <div style=\"padding:12px 16px;font-weight:700;color:#0B2240;font-size:14px;line-height:1.45\">{{ row.cap }}<\u002Fdiv>\n              <div style=\"padding:12px 16px;color:#0E7C5A;font-weight:600;font-size:14px;line-height:1.45;background:#F3FBF8\">{{ row.reeco }}<\u002Fdiv>\n              <div style=\"padding:12px 16px;color:#9A3326;font-size:14px;line-height:1.45\">{{ row.craft }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 5. OBJECTION HANDLING -->\n    <section style=\"margin-top:36px\">\n      <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:14px\">\n        <span style=\"color:#16B8A6;font-weight:900;font-size:16px\">///<\u002Fspan>\n        <h2 style=\"font-size:23px;font-weight:800;margin:0;color:#0B2240\">Objection handling <span style=\"color:#8593A6;font-weight:600;font-size:15px\">(copyable rebuttals)<\u002Fspan><\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:grid;gap:14px\">\n        <sc-for list=\"{{ objections }}\" as=\"ob\" hint-placeholder-count=\"4\">\n          <div style=\"background:#fff;border:1px solid #E4E9F0;border-radius:14px;padding:18px 20px;box-shadow:0 2px 10px rgba(11,34,64,.05);display:grid;grid-template-columns:minmax(180px,38%) 1fr;gap:18px;align-items:start\">\n            <div style=\"display:flex;flex-direction:column;gap:6px\">\n              <span style=\"font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:#C0392B\">They say<\u002Fspan>\n              <span style=\"font-size:15px;font-weight:600;color:#0B2240;line-height:1.45\">{{ ob.say }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:10px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px\">\n                <span style=\"font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:#1A9E6A\">You say<\u002Fspan>\n                <button type=\"button\" onclick=\"{{ ob.onCopy }}\" class=\"bc-noprint\" style=\"flex:none;display:inline-flex;align-items:center;gap:6px;border:1.5px solid #16B8A6;color:#0E7C6F;background:#fff;font:700 12px/1 'Inter',sans-serif;padding:7px 12px;border-radius:8px;cursor:pointer;white-space:nowrap;transition:all .15s\" style-hover=\"background:#16B8A6;color:#fff\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"9\" y=\"9\" width=\"13\" height=\"13\" rx=\"2\"><\u002Frect><path d=\"M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1\"><\u002Fpath><\u002Fsvg>Copy<\u002Fbutton>\n              <\u002Fdiv>\n              <span style=\"font-size:14.5px;color:#3D4A5C;line-height:1.55\">{{ ob.resp }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 6. READY-TO-PASTE SNIPPETS -->\n    <section style=\"margin-top:36px\">\n      <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:14px\">\n        <span style=\"color:#16B8A6;font-weight:900;font-size:16px\">///<\u002Fspan>\n        <h2 style=\"font-size:23px;font-weight:800;margin:0;color:#0B2240\">📋 Ready-to-paste snippets<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:grid;gap:16px\">\n        <sc-for list=\"{{ snippets }}\" as=\"s\" hint-placeholder-count=\"3\">\n          <div style=\"background:#0B2240;border-radius:14px;padding:20px 22px;box-shadow:0 8px 24px rgba(11,34,64,.16)\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:10px\">\n              <span style=\"font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:#16B8A6\">{{ s.label }}<\u002Fspan>\n              <button type=\"button\" onclick=\"{{ s.onCopy }}\" class=\"bc-noprint\" style=\"display:inline-flex;align-items:center;gap:6px;border:1.5px solid rgba(22,184,166,.6);color:#16B8A6;background:rgba(22,184,166,.1);font:700 12px/1 'Inter',sans-serif;padding:8px 14px;border-radius:8px;cursor:pointer;white-space:nowrap;transition:all .15s\" style-hover=\"background:#16B8A6;color:#04211D;border-color:#16B8A6\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"9\" y=\"9\" width=\"13\" height=\"13\" rx=\"2\"><\u002Frect><path d=\"M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1\"><\u002Fpath><\u002Fsvg>Copy<\u002Fbutton>\n            <\u002Fdiv>\n            <p style=\"font-size:15px;line-height:1.6;margin:0;color:#DCE6F2\">{{ s.text }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- 7. WATCH-OUTS -->\n    <sc-if value=\"{{ showWatchouts }}\" hint-placeholder-val=\"{{ true }}\">\n      <section style=\"margin-top:36px\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:14px\">\n          <span style=\"color:#16B8A6;font-weight:900;font-size:16px\">///<\u002Fspan>\n          <h2 style=\"font-size:23px;font-weight:800;margin:0;color:#0B2240\">🚧 Watch-outs <span style=\"color:#8593A6;font-weight:600;font-size:15px\">(internal)<\u002Fspan><\u002Fh2>\n        <\u002Fdiv>\n        <div style=\"background:#FCEEEC;border:1px solid #F3C9C2;border-left:5px solid #C0392B;border-radius:14px;padding:16px 20px\">\n          <ul style=\"margin:0;padding-left:20px;color:#7A241A;font-size:14px;line-height:1.65\">\n            <sc-for list=\"{{ watchouts }}\" as=\"w\" hint-placeholder-count=\"3\">\n              <li style=\"margin:4px 0\">{{ w }}<\u002Fli>\n            <\u002Fsc-for>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fsc-if>\n\n    <footer style=\"margin-top:40px;padding:22px 0 44px;border-top:1px solid #D8DFE9;color:#5A6B82;font-size:13px;line-height:1.6;text-align:center\">\n      🔒 Internal sales enablement — verify intel before each use. Quotes are from real Craftable users and switchers — keep attribution at role / segment level if shared externally.\n    <\u002Ffooter>\n  <\u002Fmain>\n\n  <!-- COPY TOAST -->\n  <sc-if value=\"{{ toast }}\" hint-placeholder-val=\"{{ false }}\">\n    <div class=\"bc-noprint\" style=\"position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#0B2240;color:#fff;padding:12px 22px;border-radius:999px;font-weight:700;font-size:14px;box-shadow:0 12px 32px rgba(11,34,64,.4);z-index:100;animation:bcToastIn .18s cubic-bezier(.16,1,.3,1);display:flex;gap:8px;align-items:center\">Copied <span style=\"color:#16B8A6\">✓<\u002Fspan><\u002Fdiv>\n  <\u002Fsc-if>\n\n  \n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1120, &quot;height&quot;: 900 },\n  &quot;segmentLabel&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;M3 accounts&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;lastUpdated&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Updated Jun 2026&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;showWatchouts&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { toast: false };\n\n  doCopy(text) {\n    let done = false;\n    try {\n      if (navigator.clipboard && window.isSecureContext) {\n        navigator.clipboard.writeText(text);\n        done = true;\n      }\n    } catch (e) { done = false; }\n    if (!done) {\n      try {\n        const ta = document.createElement('textarea');\n        ta.value = text;\n        ta.setAttribute('readonly', '');\n        ta.style.position = 'fixed';\n        ta.style.top = '-1000px';\n        ta.style.opacity = '0';\n        document.body.appendChild(ta);\n        ta.select();\n        document.execCommand('copy');\n        document.body.removeChild(ta);\n      } catch (e) { /* noop */ }\n    }\n    this.setState({ toast: true });\n    clearTimeout(this._t);\n    this._t = setTimeout(() => this.setState({ toast: false }), 1700);\n  }\n\n  renderVals() {\n    const copy = (t) => () => this.doCopy(t);\n\n    const positioningText =\n      \"Whether they're on Craftable today or weighing the two, the takeaway is the same: Craftable is an F&B tool \\u2014 Reeco runs the whole property and posts coded spend straight into accounting. The operators who actually used Craftable chose Reeco. On M3, the connection is even cleaner: coded PO and invoice detail land in the M3 GL with no separate integration fee.\";\n\n    const scenarios = [\n      { num: '1', title: 'Already on Craftable \\u2192 displace', body: \"Anchor on what current users say is breaking \\u2014 then de-risk the switch: import their order guides, time the cutover, no double-pay.\", badgeBg: '#16B8A6', badgeColor: '#04211D' },\n      { num: '2', title: 'Choosing between the two \\u2192 compare', body: \"Craftable solves F&B; Reeco solves the whole property and lands coded spend in accounting. Operators who tried both chose Reeco.\", badgeBg: '#0B2240', badgeColor: '#fff' }\n    ];\n\n    const wins = [\n      { title: 'Whole-property, not just F&B', body: \"Reeco runs purchasing, receiving, inventory, recipes and AP across every department — F&B, housekeeping, engineering and guest supplies — on one platform. Craftable is built around food & beverage, which is where its depth and customer base sit.\" },\n      { title: 'It actually connects', body: \"Native two-way GL sync posts coded POs and invoice lines straight into accounting \\u2014 and on M3, with no separate integration fee. Craftable's handoff breaks and teams re-key by hand.\" },\n      { title: 'Proof, not promises', body: \"Tandem migrated off Craftable to Reeco. Prospera tried Craftable, then chose Reeco for AP.\" }\n    ];\n\n    const q = (text, attr, onCopyText) => ({ text, attr, onCopy: copy(onCopyText) });\n    const quoteGroups = [\n      {\n        heading: 'What Craftable users report \\u2014 evidence for either audience',\n        accent: '#C0392B', cols: 'repeat(auto-fit,minmax(300px,1fr))',\n        items: [\n          q('\\u201CCraftable AI is costing us money, literally. We\\u2019re having to manually code the invoices because their AI is so broken.\\u201D', '\\u2014 SVP, Sage Hospitality',\n            '\\u201CCraftable AI is costing us money, literally. We\\u2019re having to manually code the invoices because their AI is so broken.\\u201D \\u2014 SVP, Sage Hospitality'),\n          q('Craftable AP is completely broken \\u2014 teams have abandoned it and code everything manually. Their words: \\u201CCraftable built a dashboard using broken AI to prove their broken AI is working.\\u201D', '\\u2014 SVP, Sage Hospitality',\n            'Craftable AP is completely broken \\u2014 teams have abandoned it and code everything manually. Their words: \\u201CCraftable built a dashboard using broken AI to prove their broken AI is working.\\u201D \\u2014 SVP, Sage Hospitality')\n        ]\n      },\n      {\n        heading: 'Chose Reeco over Craftable',\n        accent: '#1A9E6A', cols: 'repeat(auto-fit,minmax(300px,1fr))',\n        items: [\n          q('\\u201CIt\\u2019s so much more user friendly than the Craftable we were using. And connects automatically to the other systems\\u2026 plus we can build in the other inventory \\u2014 linens, housekeeping, all the guest supplies into one big platform.\\u201D', '\\u2014 Kelly Wilken, VP Finance, Tandem Hospitality (migrated off Craftable)',\n            '\\u201CIt\\u2019s so much more user friendly than the Craftable we were using. And connects automatically to the other systems\\u2026 plus we can build in the other inventory \\u2014 linens, housekeeping, all the guest supplies into one big platform.\\u201D \\u2014 Kelly Wilken, VP Finance, Tandem Hospitality'),\n          q('\\u201CWe used the M3 intelligent imaging. And then for another project that we do, we\\u2019ve used Craftable\\u2026 Neither solution completely 100% fits our needs.\\u201D', '\\u2014 Tim Breed, Prospera Hospitality (evaluated Craftable, chose Reeco for AP)',\n            '\\u201CWe used the M3 intelligent imaging. And then for another project that we do, we\\u2019ve used Craftable\\u2026 Neither solution completely 100% fits our needs.\\u201D \\u2014 Tim Breed, Prospera Hospitality (chose Reeco for AP)')\n        ]\n      }\n    ];\n\n    const comparison = [\n      { cap: 'Scope', reeco: 'Whole-property \\u2014 every department', craft: 'F&B focused' },\n      { cap: 'Accounting sync', reeco: 'Native two-way \\u2014 coded PO + invoice lines into the GL', craft: 'Handoff breaks; teams re-reference Craftable' },\n      { cap: 'Separate M3 integration fee', reeco: 'None \\u2014 M3 waives it for Reeco', craft: 'Customer pays it today' },\n      { cap: 'AP automation', reeco: 'AI coding + 3-way match that works', craft: 'AI coding issues reported by users' },\n      { cap: 'Live supplier pricing', reeco: 'Auto', craft: 'Manual' },\n      { cap: 'Inventory / recipes', reeco: 'Full, every department', craft: 'F&B items only' },\n      { cap: 'Implementation', reeco: 'Weeks \\u2014 we set it up', craft: 'Longer, more hands-on setup' }\n    ];\n\n    const ob = (say, resp) => ({ say, resp, onCopy: copy(resp) });\n    const objections = [\n      ob('\\u201CWe\\u2019re also looking at Craftable \\u2014 isn\\u2019t it the F&B standard?\\u201D',\n        \"For F&B alone it's capable \\u2014 but you're buying procurement for the whole property, and it has to land in accounting. That's where Reeco differs. Talk to operators who used Craftable and chose us.\"),\n      ob('\\u201COur F&B team loves Craftable.\\u201D',\n        \"Keep the intelligence \\u2014 Reeco extends it whole-property and into the GL.\"),\n      ob('\\u201CCraftable just relaunched their AI.\\u201D',\n        \"The real question is what it's wired into. Let's show a coded invoice landing in the GL, live.\"),\n      ob('\\u201CSwitching is disruptive.\\u201D',\n        \"Tandem and Prospera call it easier. We import your order guides and time the cutover \\u2014 no double-pay.\")\n    ];\n\n    const snip = (label, text) => ({ label, text, onCopy: copy(text) });\n    const snippets = [\n      snip('Evaluation opener \\u2014 choosing between the two',\n        \"If you're weighing Craftable and Reeco: Craftable is strong inside F&B, but you're buying procurement for the whole property and it has to land in your accounting system. Reeco runs every department and posts coded PO and invoice detail straight into your GL \\u2014 and the operators who tried both went with Reeco.\"),\n      snip('Displacement opener \\u2014 already on Craftable',\n        \"Most teams we move off Craftable tell us the same two things: it’s built around F&B, and the accounting handoff makes them re-key invoices by hand. Reeco runs every department and posts coded PO and invoice detail straight into your GL \\u2014 and the operators who switched (Tandem, Prospera) say it's easier day one.\"),\n      snip('Proof line',\n        \"A hotel group that ran Craftable put it simply: \\u201CIt\\u2019s so much more user friendly than the Craftable we were using. And connects automatically to the other systems.\\u201D \\u2014 Tandem Hospitality\")\n    ];\n\n    const watchouts = [\n      \"Essex is still on Craftable (active multi-year contract, F&B retained near-term). Do NOT cite Essex as a completed Craftable switch \\u2014 Reeco displaced BirchStreet and filled an M3 AP gap there, with F&B / Craftable displacement targeted for year 2.\",\n      \"Prospera used Craftable on a side project, not their primary stack. Frame as \\u201Ctried it, picked Reeco for AP\\u201D \\u2014 not \\u201Cripped it out.\\u201D\",\n      \"Craftable relaunched AI in Jun 2026 (\\u201Ctransparency, not hype\\u201D) \\u2014 anchor the broken-AI line to a named operator, not a generic claim.\",\n      \"Don't fight on \\u201CF&B\\u201D \\u2014 Craftable is genuinely strong there. Pull the conversation to whole-property + accounting.\",\n      \"Their SKU\\u2192GL memory and F&B loyalty are real. Respect them first, then out-scope.\"\n    ];\n\n    return {\n      toast: this.state.toast,\n      segmentLabel: this.props.segmentLabel ?? 'M3 accounts',\n      lastUpdated: this.props.lastUpdated ?? 'Updated Jun 2026',\n      showWatchouts: this.props.showWatchouts ?? true,\n      positioning: { text: positioningText, onCopy: copy(positioningText) },\n      scenarios, wins, quoteGroups, comparison, objections, snippets, watchouts\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
